<svg width="680" height="360" viewBox="0 70 680 360" xmlns="http://www.w3.org/2000/svg">
  <!-- gray header/label cells -->
  <g fill="#9e9e98" fill-opacity="0.18" stroke="#9e9e98" stroke-width="0.5">
    <rect x="180" y="80" width="40" height="40" rx="4"/>
    <rect x="220" y="80" width="70" height="40" rx="4"/>
    <rect x="360" y="80" width="70" height="40" rx="4"/>
    <rect x="430" y="80" width="70" height="40" rx="4"/>
    <rect x="180" y="120" width="40" height="40" rx="4"/>
    <rect x="180" y="160" width="40" height="40" rx="4"/>
    <rect x="180" y="240" width="40" height="40" rx="4"/>
    <rect x="180" y="280" width="40" height="40" rx="4"/>
  </g>

  <!-- highlighted header B, row label 3, and cell B3 -->
  <rect x="290" y="80" width="70" height="40" rx="4" fill="#4caf50" fill-opacity="0.20" stroke="#4caf50" stroke-width="1"/>
  <rect x="180" y="200" width="40" height="40" rx="4" fill="#4caf50" fill-opacity="0.20" stroke="#4caf50" stroke-width="1"/>
  <rect x="290" y="200" width="70" height="40" rx="6" fill="#4caf50" fill-opacity="0.24" stroke="#4caf50" stroke-width="1.5"/>

  <!-- grid lines -->
  <g stroke="#9e9e98" stroke-width="0.5">
    <line x1="180" y1="80" x2="180" y2="320"/>
    <line x1="220" y1="80" x2="220" y2="320"/>
    <line x1="290" y1="80" x2="290" y2="320"/>
    <line x1="360" y1="80" x2="360" y2="320"/>
    <line x1="430" y1="80" x2="430" y2="320"/>
    <line x1="500" y1="80" x2="500" y2="320"/>
    <line x1="180" y1="80" x2="500" y2="80"/>
    <line x1="180" y1="120" x2="500" y2="120"/>
    <line x1="180" y1="160" x2="500" y2="160"/>
    <line x1="180" y1="200" x2="500" y2="200"/>
    <line x1="180" y1="240" x2="500" y2="240"/>
    <line x1="180" y1="280" x2="500" y2="280"/>
    <line x1="180" y1="320" x2="500" y2="320"/>
  </g>

  <!-- column headers -->
  <g font-family="Arial, Helvetica, sans-serif" font-size="14" font-weight="500" text-anchor="middle" dominant-baseline="central">
    <text x="255" y="100" fill="#7a7a74">A</text>
    <text x="325" y="100" fill="#388e3c">B</text>
    <text x="395" y="100" fill="#7a7a74">C</text>
    <text x="465" y="100" fill="#7a7a74">D</text>

    <!-- row labels -->
    <text x="200" y="140" fill="#7a7a74">1</text>
    <text x="200" y="180" fill="#7a7a74">2</text>
    <text x="200" y="220" fill="#388e3c">3</text>
    <text x="200" y="260" fill="#7a7a74">4</text>
    <text x="200" y="300" fill="#7a7a74">5</text>

    <!-- B3 label -->
    <text x="325" y="220" fill="#388e3c">B3</text>
  </g>

  <!-- breakdown row -->
  <g fill="#4caf50" fill-opacity="0.20" stroke="#4caf50" stroke-width="1">
    <rect x="160" y="360" width="120" height="50" rx="8"/>
    <rect x="320" y="360" width="120" height="50" rx="8"/>
  </g>
  <rect x="480" y="360" width="120" height="50" rx="8" fill="#2e7d32" stroke="#2e7d32" stroke-width="1"/>

  <g font-family="Arial, Helvetica, sans-serif" text-anchor="middle" dominant-baseline="central">
    <text x="220" y="380" font-size="14" font-weight="500" fill="#388e3c">B</text>
    <text x="220" y="398" font-size="12" fill="#388e3c">colonne</text>

    <text x="380" y="380" font-size="14" font-weight="500" fill="#388e3c">3</text>
    <text x="380" y="398" font-size="12" fill="#388e3c">ligne</text>

    <text x="540" y="380" font-size="14" font-weight="500" fill="#ffffff">B3</text>
    <text x="540" y="398" font-size="12" fill="#e8f5e9">adresse</text>

    <text x="300" y="385" font-size="14" fill="#7a7a74">+</text>
    <text x="460" y="385" font-size="14" fill="#7a7a74">=</text>
  </g>
</svg>