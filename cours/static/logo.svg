<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 40 40" fill="none">
  <!-- Background circle -->
  <circle cx="20" cy="20" r="20" fill="#2e7d32"/>
  <!-- Mortarboard cap top (flat rectangle rotated) -->
  <polygon points="20,8 34,15 20,22 6,15" fill="white" opacity="0.95"/>
  <!-- Cap string / tassel base -->
  <rect x="19" y="22" width="2" height="8" fill="white" opacity="0.85" rx="1"/>
  <!-- Tassel -->
  <circle cx="20" cy="31" r="2.5" fill="white" opacity="0.85"/>
  <!-- Book lines on the cap -->
  <line x1="14" y1="15" x2="26" y2="15" stroke="#2e7d32" stroke-width="1.2" opacity="0.3"/>
</svg>
